version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: heat-relief-db
    environment:
      POSTGRES_DB: heat_relief
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d heat_relief"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
